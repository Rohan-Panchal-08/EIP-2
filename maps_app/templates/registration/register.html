{% extends "base.html" %}

{% block title %}Sign Up - Maps Clone{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create an Account</h2>
        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="primary-btn full-width">Sign Up</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Log In</a></p>
    </div>
</div>
{% endblock %}
