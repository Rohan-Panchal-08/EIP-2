{% extends "base.html" %}

{% block title %}Log In - Maps Clone{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="primary-btn full-width">Log In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Sign Up</a></p>
    </div>
</div>
{% endblock %}
